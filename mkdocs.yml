      - "10. Coding Agents": 2_intermediate/10_coding_agents.md
      - "11. Harness Engineering": 2_intermediate/11_harness_engineering.md
      - "12. Security": 2_intermediate/12_security.md
      - "13. Loop Engineering": 2_intermediate/13_loop_engineering.md
      - "14. Personal Agents": 2_intermediate/14_personal_agents.md
  - "🚧 Expert (Draft)":
