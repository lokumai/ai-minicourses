      - "3. RAG & Embeddings": 1_fundamentals/3_rag.md
      - "4. Tool Calling": 1_fundamentals/4_tools.md
      - "5. Memory": 1_fundamentals/5_memory.md
      - "6. AI Agents": 1_fundamentals/6_agents.md
      - "7. Multi-Agent Systems": 1_fundamentals/7_multi_agent.md
  - "🚧 Intermediate (Draft)":
