site_name: AI Mini-Courses
site_description: AI Engineering made simple, short, and useful.
site_url: https://lokumai.github.io/ai-minicourses/
repo_url: https://github.com/lokumai/ai-minicourses
repo_name: lokumai/ai-minicourses

docs_dir: mini-courses

exclude_docs: |
  scratchpad/

not_in_nav: |
  *_tr.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.footer
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Fundamentals:
      - Overview: 1_fundamentals/README.md
      - "1. LLM Fundamentals": 1_fundamentals/1_llms.md
